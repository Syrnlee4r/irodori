<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis Kosakata Irodori 入門</title>
<style>
  :root{
    --pink:#e85c8a; --pink-d:#c73f6d; --bg:#fff7f9; --card:#ffffff;
    --green:#2e9e5b; --red:#d9453f; --gray:#666; --line:#f0d6df;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(135deg,#fdf1f4,#eef7fb);
    margin:0; padding:20px; color:#2b2b2b;
  }
  .wrap{max-width:760px;margin:0 auto;}
  h1{
    text-align:center;color:var(--pink-d);font-size:1.6em;margin-bottom:4px;
  }
  .subtitle{text-align:center;color:var(--gray);margin-bottom:18px;font-size:.95em;}
  .card{
    background:var(--card);border-radius:16px;padding:22px 24px;
    box-shadow:0 6px 20px rgba(0,0,0,.08); margin-bottom:16px;
  }
  /* Level selector */
  #levelSelect .level-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;margin-top:14px;
  }
  .level-btn{
    background:#fff;border:2px solid var(--line);border-radius:12px;
    padding:12px 10px;cursor:pointer;text-align:left;transition:.15s;
  }
  .level-btn:hover{border-color:var(--pink);transform:translateY(-2px);}
  .level-btn b{display:block;color:var(--pink-d);font-size:1.05em;}
  .level-btn span{font-size:.8em;color:var(--gray);}
  /* progress */
  .progress-wrap{margin-bottom:14px;}
  .progress-label{
    display:flex;justify-content:space-between;font-size:.85em;color:var(--gray);
    margin-bottom:6px;
  }
  .progress-bar{
    background:#f0e2e6;border-radius:20px;height:12px;overflow:hidden;
  }
  .progress-fill{
    background:linear-gradient(90deg,var(--pink),#f7a4c0);
    height:100%;width:0%;transition:width .3s;
  }
  .level-tag{
    display:inline-block;background:#fde3ec;color:var(--pink-d);
    font-size:.78em;font-weight:600;padding:3px 10px;border-radius:20px;
    margin-bottom:10px;
  }
  .qtext{font-size:1.15em;font-weight:600;margin:6px 0 4px;}
  .qsub{color:var(--gray);font-size:.85em;margin-bottom:16px;}
  .options{display:grid;gap:10px;}
  .opt{
    border:2px solid var(--line);background:#fffafc;border-radius:10px;
    padding:12px 14px;cursor:pointer;text-align:left;font-size:1em;
    transition:.15s;
  }
  .opt:hover{border-color:var(--pink);background:#fff0f5;}
  .opt.correct{border-color:var(--green);background:#e9f8ee;color:#1d6b3c;font-weight:600;}
  .opt.wrong{border-color:var(--red);background:#fdecec;color:#a3302c;font-weight:600;}
  .opt.disabled{pointer-events:none;opacity:.85;}
  #feedback{
    margin-top:14px;padding:10px 14px;border-radius:10px;font-size:.95em;
    display:none;
  }
  #feedback.show{display:block;}
  #feedback.ok{background:#e9f8ee;color:#1d6b3c;}
  #feedback.bad{background:#fdecec;color:#a3302c;}
  .nav-row{display:flex;justify-content:space-between;margin-top:18px;gap:10px;}
  button.nav{
    background:var(--pink);color:#fff;border:none;border-radius:10px;
    padding:10px 18px;font-size:.95em;cursor:pointer;font-weight:600;
  }
  button.nav:disabled{background:#f2b9cd;cursor:not-allowed;}
  button.ghost{
    background:#fff;color:var(--pink-d);border:2px solid var(--pink);
  }
  #resultCard{display:none;text-align:center;}
  #resultCard .score{font-size:2.4em;color:var(--pink-d);font-weight:800;margin:10px 0;}
  #resultCard .detail{color:var(--gray);margin-bottom:16px;}
  .review{
    text-align:left;border-top:1px solid var(--line);margin-top:14px;padding-top:14px;
    max-height:340px;overflow-y:auto;
  }
  .review-item{padding:8px 0;border-bottom:1px dashed var(--line);font-size:.9em;}
  .review-item.correct b.mark{color:var(--green);}
  .review-item.wrong b.mark{color:var(--red);}
  .backbar{margin-bottom:14px;}
  .backbtn{
    background:none;border:none;color:var(--pink-d);font-weight:600;cursor:pointer;
    font-size:.9em;
  }
  .hidden{display:none !important;}
  .badge-count{
    display:inline-block;background:#fbeef3;color:var(--pink-d);border-radius:20px;
    padding:2px 10px;font-size:.75em;margin-left:6px;
  }
  /* ==== new controls (audio, furigana, direction) ==== */
  .ctrl-row{
    display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px;
  }
  .ctrl-btn{
    background:#fff;border:2px solid var(--pink);color:var(--pink-d);
    border-radius:10px;padding:6px 12px;font-size:.85em;font-weight:600;
    cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;
  }
  .ctrl-btn:hover{background:#fff0f5;}
  .ctrl-btn.active{background:var(--pink);color:#fff;}
  .audio-btn{
    background:#fff;border:2px solid var(--pink);color:var(--pink-d);
    border-radius:50%;width:34px;height:34px;min-width:34px;
    display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:1em;padding:0;vertical-align:middle;margin-left:8px;
  }
  .audio-btn:hover{background:#fff0f5;}
  .audio-btn:active{transform:scale(.92);}
  ruby rt{
    font-size:.55em;color:var(--pink-d);user-select:none;
  }
  .qtext-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>いろどり 入門 ことばリスト</h1>
  <div class="subtitle">Kuis Kosakata Irodori — Tingkat Pemula (Semua 18 Pelajaran)</div>

  <!-- LEVEL SELECT -->
  <div class="card" id="levelSelect">
    <div class="level-tag">Pilih Pelajaran</div>
    <div class="qtext" style="font-size:1em;">Silakan pilih level (pelajaran) yang ingin dikerjakan:</div>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <!-- QUIZ -->
  <div class="card hidden" id="quizCard">
    <div class="backbar"><button class="backbtn" onclick="backToLevels()">&larr; Kembali ke daftar pelajaran</button></div>
    <div class="level-tag" id="levelTagLabel"></div>

    <div class="ctrl-row">
      <button class="ctrl-btn" id="furiganaBtn" onclick="toggleFurigana()">あ Furigana: <span id="furiganaState">Mati</span></button>
      <button class="ctrl-btn" id="directionBtn" onclick="toggleDirection()">🔄 <span id="directionState">JP → ID</span></button>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">Soal 1 / 10</span>
        <span id="scoreText">Skor: 0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="qtext-row">
      <div class="qtext" id="qText"></div>
      <button class="audio-btn" id="audioBtn" onclick="playAudio()" title="Dengarkan pengucapan">🔊</button>
    </div>
    <div class="qsub" id="qSub"></div>
    <div class="options" id="optionsBox"></div>
    <div id="feedback"></div>
    <div class="nav-row">
      <button class="nav ghost" id="prevBtn" onclick="prevQuestion()">&larr; Sebelumnya</button>
      <button class="nav" id="nextBtn" onclick="nextQuestion()" disabled>Berikutnya &rarr;</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card" id="resultCard">
    <div class="level-tag">Hasil</div>
    <div class="qtext" id="resultLevelName"></div>
    <div class="score" id="scoreBig">0 / 0</div>
    <div class="detail" id="scoreDetail"></div>
    <div class="nav-row">
      <button class="nav ghost" onclick="retryLevel()">Ulangi Level Ini</button>
      <button class="nav" onclick="backToLevels()">Pilih Pelajaran Lain</button>
    </div>
    <div class="review" id="reviewBox"></div>
  </div>
</div>

/* ============ STATE ============ */
let currentLevelIndex = null;
let questions = [];      // array of {q, options[], answerIdx, romaji}
let currentQ = 0;
let userAnswers = [];    // -1 = unanswered
let score = 0;
let furiganaOn = false;      // furigana toggle state
let quizDirection = 'jp2id'; // 'jp2id' or 'id2jp'

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* build 4-option MC questions.
   direction 'jp2id': soal Jepang -> jawaban Indonesia (default, perilaku asli)
   direction 'id2jp': soal Indonesia -> jawaban Jepang (kana + romaji) */
function buildQuestions(level, direction){
  direction = direction || 'jp2id';
  const pool = level.words;
  const qs = pool.map((entry, idx)=>{
    const [jp, romaji, id] = entry;

    if(direction === 'id2jp'){
      // jawaban berupa "kana (romaji)"
      const correctLabel = `${jp} (${romaji})`;
      let others = pool.filter((_,i)=>i!==idx).map(e=>`${e[0]} (${e[1]})`);
      others = shuffle(others).slice(0,3);
      while(others.length < 3){
        const allWords = LEVELS.flatMap(l=>l.words.map(w=>`${w[0]} (${w[1]})`));
        const candidate = allWords[Math.floor(Math.random()*allWords.length)];
        if(candidate !== correctLabel && !others.includes(candidate)) others.push(candidate);
      }
      const options = shuffle([correctLabel, ...others]);
      const answerIdx = options.indexOf(correctLabel);
      return { jp, romaji, id, options, answerIdx, direction };
    }

    // default: jp2id
    let others = pool.filter((_,i)=>i!==idx).map(e=>e[2]);
    others = shuffle(others).slice(0,3);
    while(others.length < 3){ // in tiny levels, pad from all levels
      const allMeanings = LEVELS.flatMap(l=>l.words.map(w=>w[2]));
      const candidate = allMeanings[Math.floor(Math.random()*allMeanings.length)];
      if(candidate !== id && !others.includes(candidate)) others.push(candidate);
    }
    const options = shuffle([id, ...others]);
    const answerIdx = options.indexOf(id);
    return { jp, romaji, id, options, answerIdx, direction };
  });
  return shuffle(qs);
}

/* ============ RENDER LEVEL LIST ============ */
function renderLevelGrid(){
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach((lvl, i)=>{
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    btn.innerHTML = `<b>${lvl.id}</b><span>${lvl.name.replace(lvl.id+' — ','')}</span><span class="badge-count">${lvl.words.length} kata</span>`;
    btn.onclick = ()=> startLevel(i);
    grid.appendChild(btn);
  });
}

function startLevel(i){
  currentLevelIndex = i;
  const level = LEVELS[i];
  questions = buildQuestions(level, quizDirection);
  currentQ = 0;
  score = 0;
  userAnswers = new Array(questions.length).fill(-1);
  document.getElementById('levelSelect').classList.add('hidden');
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('levelTagLabel').textContent = level.name;
  renderQuestion();
}

function backToLevels(){
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('levelSelect').classList.remove('hidden');
}

function retryLevel(){
  startLevel(currentLevelIndex);
}

/* ============ RENDER QUESTION ============ */
function renderQuestion(){
  const total = questions.length;
  const q = questions[currentQ];
  document.getElementById('progressText').textContent = `Soal ${currentQ+1} / ${total}`;
  document.getElementById('scoreText').textContent = `Skor: ${score}`;
  document.getElementById('progressFill').style.width = `${((currentQ)/total)*100}%`;

  const qTextEl = document.getElementById('qText');
  const audioBtn = document.getElementById('audioBtn');
  if(q.direction === 'id2jp'){
    qTextEl.innerHTML = '';
    qTextEl.textContent = q.id;
    document.getElementById('qSub').textContent = `Apa Bahasa Jepangnya?`;
    audioBtn.style.display = 'none'; // teks Indonesia, TTS Jepang tidak relevan untuk soal
  } else {
    qTextEl.innerHTML = renderJapaneseText(q.jp);
    document.getElementById('qSub').textContent = `(${q.romaji}) — Apa artinya dalam Bahasa Indonesia?`;
    audioBtn.style.display = 'inline-flex';
  }

  const box = document.getElementById('optionsBox');
  box.innerHTML = '';
  q.options.forEach((opt, idx)=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = opt;
    b.onclick = ()=> selectAnswer(idx);
    box.appendChild(b);
  });

  const fb = document.getElementById('feedback');
  fb.className = ''; fb.textContent = '';

  document.getElementById('prevBtn').disabled = (currentQ===0);
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = (currentQ === total-1) ? 'Selesai & Lihat Hasil' : 'Berikutnya →';

  // restore previous answer state if navigated back
  if(userAnswers[currentQ] !== -1){
    applyAnswerVisual(userAnswers[currentQ], q);
    nextBtn.disabled = false;
  } else {
    nextBtn.disabled = true;
  }
}

function selectAnswer(idx){
  const q = questions[currentQ];
  if(userAnswers[currentQ] !== -1) return; // already answered
  userAnswers[currentQ] = idx;
  if(idx === q.answerIdx) score++;
  applyAnswerVisual(idx, q);
  document.getElementById('scoreText').textContent = `Skor: ${score}`;
  document.getElementById('nextBtn').disabled = false;
}

function applyAnswerVisual(chosenIdx, q){
  const opts = document.querySelectorAll('#optionsBox .opt');
  opts.forEach((el, idx)=>{
    el.classList.add('disabled');
    if(idx === q.answerIdx) el.classList.add('correct');
    if(idx === chosenIdx && idx !== q.answerIdx) el.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  const questionLabel = (q.direction === 'id2jp') ? q.id : `${q.jp} (${q.romaji})`;
  if(chosenIdx === q.answerIdx){
    fb.classList.add('ok'); fb.classList.remove('bad');
    fb.textContent = `✅ Benar! ${questionLabel} = ${q.options[q.answerIdx]}`;
  } else {
    fb.classList.add('bad'); fb.classList.remove('ok');
    fb.textContent = `❌ Kurang tepat. Jawaban benar: ${q.options[q.answerIdx]}`;
  }
}

function nextQuestion(){
  if(currentQ === questions.length - 1){
    showResult();
    return;
  }
  currentQ++;
  renderQuestion();
}

function prevQuestion(){
  if(currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

/* ============ RESULT ============ */
function showResult(){
  document.getElementById('quizCard').classList.add('hidden');
  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';
  const total = questions.length;
  document.getElementById('resultLevelName').textContent = LEVELS[currentLevelIndex].name;
  document.getElementById('scoreBig').textContent = `${score} / ${total}`;
  const pct = Math.round((score/total)*100);
  let msg = '';
  if(pct === 100) msg = 'Sempurna! Kamu sudah menguasai kosakata ini. 🎉';
  else if(pct >= 80) msg = 'Bagus sekali! Sedikit lagi sempurna. 👏';
  else if(pct >= 60) msg = 'Lumayan, terus berlatih ya! 💪';
  else msg = 'Yuk, ulangi lagi supaya makin hafal. 📚';
  document.getElementById('scoreDetail').textContent = `${pct}% benar — ${msg}`;

  const review = document.getElementById('reviewBox');
  review.innerHTML = '';
  questions.forEach((q, i)=>{
    const chosen = userAnswers[i];
    const isCorrect = chosen === q.answerIdx;
    const div = document.createElement('div');
    div.className = 'review-item ' + (isCorrect ? 'correct':'wrong');
    const questionLabel = (q.direction === 'id2jp') ? q.id : `${q.jp} (${q.romaji})`;
    div.innerHTML = `<b class="mark">${isCorrect?'✔':'✘'}</b> ${questionLabel} — Jawaban benar: <b>${q.options[q.answerIdx]}</b>` +
      (isCorrect? '' : ` | Jawabanmu: ${chosen>=0? q.options[chosen] : '(tidak dijawab)'}`);
    review.appendChild(div);
  });
}

/* ============ FURIGANA ============ */
/* Data kosakata saat ini berupa kana (tanpa kanji), jadi fungsi ini
   siap-pakai: jika suatu kata ditulis dengan format kanji[furigana]
   contoh "食べ[た]る", ia akan dirender sebagai <ruby>. Jika tidak ada
   kanji/furigana di dalam teks, teks ditampilkan apa adanya. */
function renderJapaneseText(text){
  if(!text) return '';
  // pola: kanji[furigana] -> <ruby>kanji<rt>furigana</rt></ruby>
  const pattern = /([\u4E00-\u9FFF]+)\[([^\]]+)\]/g;
  if(!pattern.test(text)) return escapeHtml(text);
  if(!furiganaOn){
    // furigana mati: tampilkan hanya kanji-nya (tanpa ruby)
    return escapeHtml(text.replace(/([\u4E00-\u9FFF]+)\[([^\]]+)\]/g, '$1'));
  }
  return text.replace(/([\u4E00-\u9FFF]+)\[([^\]]+)\]/g, (m, kanji, furi)=>{
    return `<ruby>${escapeHtml(kanji)}<rt>${escapeHtml(furi)}</rt></ruby>`;
  });
}
function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function toggleFurigana(){
  furiganaOn = !furiganaOn;
  document.getElementById('furiganaState').textContent = furiganaOn ? 'Aktif' : 'Mati';
  document.getElementById('furiganaBtn').classList.toggle('active', furiganaOn);
  // re-render current question if quiz is active so kanji text updates
  if(questions.length && document.getElementById('quizCard') && !document.getElementById('quizCard').classList.contains('hidden')){
    const qTextEl = document.getElementById('qText');
    const q = questions[currentQ];
    if(q.direction !== 'id2jp'){
      qTextEl.innerHTML = renderJapaneseText(q.jp);
    }
  }
}

/* ============ DIRECTION TOGGLE (JP<->ID) ============ */
function toggleDirection(){
  quizDirection = (quizDirection === 'jp2id') ? 'id2jp' : 'jp2id';
  document.getElementById('directionState').textContent = (quizDirection === 'jp2id') ? 'JP → ID' : 'ID → JP';
  document.getElementById('directionBtn').classList.toggle('active', quizDirection === 'id2jp');
  // jika sedang di tengah kuis, mulai ulang level yang sama dengan arah baru
  if(currentLevelIndex !== null && document.getElementById('quizCard') && !document.getElementById('quizCard').classList.contains('hidden')){
    startLevel(currentLevelIndex);
  }
}

/* ============ AUDIO (Text-to-Speech) ============ */
function playAudio(){
  const q = questions[currentQ];
  if(!q) return;
  const textToSpeak = q.jp;
  if(!('speechSynthesis' in window)){
    alert('Maaf, browser Anda tidak mendukung fitur audio (Text-to-Speech).');
    return;
  }
  window.speechSynthesis.cancel(); // stop any ongoing speech
  const utter = new SpeechSynthesisUtterance(textToSpeak);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  window.speechSynthesis.speak(utter);
}

/* init */
renderLevelGrid();
